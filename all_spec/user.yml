components:
  schemas:
    UserFriendsOne:
      type: object
      properties:
        users_avatar:
          type: string
          default: AVATAR_1
        users_id:
          type: string
          default: 6613fae21977170d4fd608a6
        users_name:
          type: string
          default: Tommy
    UserBadgesDetail:
      type: object
      properties:
        badges_code:
          type: string
          default: N1
        badges_id:
          type: string
          default: 6695534c1da4d6fee70fc3e4
        badges_name:
          type: string
          default: 1st. Rewild
    RankingRewilding:
      type: object
      properties:
        rewilding_id:
          type: string
        rewilding_name:
          type: string
        rewilding_type_list:
          type: array
          items:
            type: string
        rewilding_participants_experience_count:
          type:
            - integer
            - 'null'
      required:
        - rewilding_id
        - rewilding_name
        - rewilding_type_list
        - rewilding_participants_experience_count
    UserOther:
      type: object
      properties:
        users_avatar:
          type: string
        users_created_at:
          type: string
          format: int32
        users_email:
          type: string
        users_id:
          type: string
        users_is_business:
          type: boolean
          default: false
        users_is_subscribed:
          type: boolean
          default: false
        users_name:
          type: string
        users_object:
          type: string
        users_password:
          type: string
        users_setting_friend_auto_add:
          type: integer
          format: int32
        users_setting_is_visible_friends:
          type: integer
          format: int32
        users_setting_is_visible_statistics:
          type: integer
          format: int32
        users_setting_language:
          type: string
        users_setting_visibility_activity_summary:
          type: integer
          format: int32
        users_source:
          type: integer
          format: int32
        users_source_id:
          type: string
        users_username:
          type: string
        users_breathing_points:
          type: integer
        users_following_count:
          type: integer
        users_follower_count:
          type: integer
        users_followings: *ref_5
      required:
        - users_avatar
        - users_created_at
        - users_email
        - users_id
        - users_is_business
        - users_is_subscribed
        - users_name
        - users_object
        - users_setting_friend_auto_add
        - users_setting_is_visible_friends
        - users_setting_is_visible_statistics
        - users_setting_language
        - users_setting_visibility_activity_summary
        - users_source
