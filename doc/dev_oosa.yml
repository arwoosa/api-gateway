openapi: 3.0.3
info:
  title: OOSA API
  description: This is OOSA's API
  version: 1.0.0
servers:
- url: http://oosa.docker.localhost/api
  description: OOSA's Dev API
tags:
- name: OOSA
- name: OOSA
- name: OOSA
paths:
