openapi: 3.0.3
info:
  title: OOSA API
  description: This is OOSA's API
  version: 1.0.0
servers:
- url: https://api-dev.oosa.life
  description: OOSA's Dev API
- url: http://oosa_user:6080
  description: OOSA_USER_SERVICE
- url: http://oosa_rewild:6080
  description: OOSA_REWILD_SERVICE
tags:
- name: OOSA_REWILD_SERVICE
  description: This is OOSA's Rewild API
- name: OOSA_USER_SERVICE
  description: This is OOSA's User API
paths:
  /auth:
    get:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: Authentication
      description: Retrieve the authenticated user detail. <br/>1. Google<br/>2. Line<br/>3.
        Email<br/>4. Facebook
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      security:
      - Bearer: []
    put:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: Update authenticated user detail
      description: Update the authenticated user detail
      requestBody:
        description: Pass in only the necessary objects you want to update
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestUsersUpdate'
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      security:
      - Bearer: []
  /auth/apple:
    post:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: User login/register
      description: Use this endpoint to login/register using Apple
      responses:
        "200":
          description: Login object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLogin'
  /auth/avatar:
    post:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: Update user avatar
      description: Update user avatar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestAuthUpdateAvatar'
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      security:
      - Bearer: []
  /auth/badges:
    get:
      tags:
      - OOSA_USER_SERVICE
      - User Badges
      summary: User badges
      description: Retrieve badges earned by user
      parameters:
      - name: single
        in: query
        description: Single acquire
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: User badges object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBadges'
      security:
      - Bearer: []
  /auth/change-password:
    put:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: Update authenticated user password
      description: Update the authenticated user password
      requestBody:
        description: Pass in new password
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestUsersUpdatePassword'
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
