components:
  schemas:
    News:
      type: object
      properties:
        news_id:
          type: string
        news_date:
          type: string
        news_title:
          type: string
        news_content:
          type: string
        news_created_at:
          type: string
        news_created_by:
          type: string
      required:
        - news_title
        - news_content
        - news_id
        - news_date
        - news_created_at
        - news_created_by
    RequestNews:
      type: object
      properties:
        news_date:
          type: string
        news_title:
          type: string
        news_content:
          type: string
      required:
        - news_title
        - news_content
    AchievementEvent:
      type: object
      properties:
        events_country_code:
          type: string
        events_country_count:
          type: integer
      required:
        - events_country_code
        - events_country_count
    RequestEventJoin:
      type: object
      properties:
        event_participants_request_message:
          type: string
    RequestCollaborativeLogExperience:
      type: object
      properties:
        events_experience:
          type: string
          default: https://surveycake.com/12
    LinkQuery:
      type: object
      properties:
        Title:
          type: string
        Description:
          type: string
        OGTitle:
          type: string
        OGDescription:
          type: string
        OGImage:
          type: string
        OGSiteName:
          type: string
      required:
        - Title
        - Description
        - OGTitle
        - OGDescription
        - OGImage
        - OGSiteName
    RequestLinkQuery:
      type: object
      properties:
        url:
          type: string
      required:
        - url
    EventSchedules:
      type: object
      properties:
        event_schedules_created_by_user: &ref_19
          $ref: '#/components/schemas/UserAgg'
        event_schedules_created_at:
          type: string
        event_schedules_created_by:
          type: string
        event_schedules_datetime:
          type: string
        event_schedules_description:
          type: string
        event_schedules_event:
          type: string
        event_schedules_id:
          type: string
    UserAgg:
      type: object
      properties:
        user_avatar:
          type: string
        user_email:
          type: string
        user_id:
          type: string
        user_name:
          type: string
      required:
        - user_email
        - user_id
        - user_name
        - user_avatar
    EventPolaroidsSimple:
      type: object
      properties:
        event_polaroids_created_at:
          type: string
        event_polaroids_created_by:
          type: string
        event_polaroids_event:
          type: string
        event_polaroids_id:
          type: string
        event_polaroids_lat:
          type: number
        event_polaroids_lng:
          type: number
        event_polaroids_url:
          type: string
      required:
        - event_polaroids_created_by
        - event_polaroids_event
        - event_polaroids_id
        - event_polaroids_lat
        - event_polaroids_lng
        - event_polaroids_url
        - event_polaroids_created_at
    EventScheduleBulk:
      type: array
      items: *ref_13
    EventScheduleBulkItemTime:
      type: object
      properties:
        time:
          type: string
          examples:
            - '08:00'
          pattern: ^(0[0-9]|1[0-9]|2[0-3]):[0-5][0-9]$
        description:
          type: string
      required:
        - time
        - description
    RewildingPhotos:
      type: object
      properties:
        rewilding_photos_id:
          type: string
        rewilding_photos_path:
          type: string
    RequestPocketListItem:
