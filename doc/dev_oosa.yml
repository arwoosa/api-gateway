    post:
      tags:
      - OOSA_REWILD_SERVICE
      - Event
      - _R 野放點細節 R/S Details
      - T2 揪團基地 Basecamp
      - T3 野放成就 Achievement
      summary: Create Event
      description: Create new event
      operationId: create-event
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - events_date
              - events_date_end
              - events_deadline
              - events_lat
              - events_lng
              - events_meeting_point_lat
              - events_meeting_point_lng
              - events_meeting_point_name
              - events_name
              properties:
                events_date:
                  type: string
                  description: 活動開始時間
                  default: "2024-06-01T09:00:00Z"
                  example: "2024-06-01T09:00:00Z"
                events_date_end:
                  type: string
                  description: 活動結束時間
                  default: "2024-06-01T18:00:00Z"
                  example: "2024-06-01T18:00:00Z"
                events_deadline:
                  type: string
                  description: 報名截止時間
                  default: "2024-05-26T00:00:00Z"
                  example: "2024-05-26T00:00:00Z"
                events_lat:
                  type: number
                  description: 活動地點-經度
                  default: -7.9421532937069514
                  example: "25.032510610605097"
                events_lng:
                  type: number
                  description: 活動地點-緯度
                  default: 112.95357004216902
                  example: "121.58739934934991"
                events_meeting_point_lat:
                  type: number
                  description: 集合地點-經度
                  default: -7.929088255289928
                  example: "25.03305498837257"
                events_meeting_point_lng:
                  type: number
                  description: 集合地點-緯度
                  default: 112.9654222278174
                  example: "121.57010446535351"
                events_meeting_point_name:
                  type: string
                  example: 象山站
                events_name:
                  type: string
                  description: 行程名稱
                  default: Hike to Bromo
                  example: 虎山親山步道
                events_participant_limit:
                  type: number
                  description: 人數上限 (0表示不限制)
                  default: 4
                  example: "0"
                events_participants:
                  type: array
                  items:
                    type: string
                events_payment_fee:
                  type: number
                  description: 報名費用 (商業團專用)
                  default: 450
                  example: "0"
                events_payment_required:
                  type: integer
                  format: int32
                  description: 非商業團帶(0)
                  default: 0
                  example: "0"
                events_photo:
                  type: string
                  format: binary
                events_photo_cover:
                  type: string
                  description: DEFAULT_0 (SKY), DEFAULT_1 (REWILDMODE_DEFAULT)
                events_place:
                  type: string
                  description: 'Add from map: pass in Google Place ID'
                  default: ChIJk9cKlIwgbzQR2BE-g395glo
                  example: ChIJX9SSyAirQjQR9B9f7PKLqJo
                events_requires_approval:
                  type: integer
                  format: int32
                  default: 1
                  example: "1"
                events_rewilding:
                  type: string
                  description: 'Add from pocketlist: Pass in Rewilding ID'
                events_type:
                  type: string
      responses:
        "200":
          description: New Event Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Events'
        "401":
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseGeneralError'
        "500":
          description: Server Error
          content:
            application/json:
              schema:
                type: object
      security:
