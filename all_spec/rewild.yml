  /rewilding-register:
    post:
      summary: Create rewilding register
      deprecated: true
      description: Create rewilding register
      operationId: create-rewilding
      tags:
        - OOSA_REWILD_SERVICE
        - Rewilding Register
        - T1 探索 Discover
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                rewilding_apply_official:
                  type: boolean
                  default: true,
                  example: true,
                rewilding_lat:
                  type: number
                  default: 7.9422379184033,
                  example: 7.9422379184033,
                rewilding_lng:
                  type: number
                  default: 112.95275441058537
                  example: '112.95275441058537'
                rewilding_name:
                  type: string
                  default: TEST_REWILDING#2
                  example: TEST_REWILDING#2
                rewilding_photo[]:
                  type: string
                  format: binary
                rewilding_pocket_list:
                  type: string
                  default: 66005467624a973abd8787d7
                  example: 66005467624a973abd8787d7
                rewilding_reference_information:
                  type: string
                  default: www.google.com
                  example: www.google.com
                rewilding_type:
                  type: string
                  default: 662696ebfc72a35c9b066f41
                  example: 662696ebfc72a35c9b066f41
      responses:
        '200':
          description: Array of rewilding register objects
          content:
            application/json:
              schema: *ref_7
      security:
        - bearer: []
