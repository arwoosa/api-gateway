  /event:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - OOSA_REWILD_SERVICE
      - T1 探索 Discover
      - Event
      summary: Retrieve Events
      description: Retrieve all events
      operationId: get-events
      responses:
        "200":
          description: Event Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Events'
        "204":
          description: No event found
          content:
            '*/*':
              schema:
                type: object
      security:
      - Bearer: []
    post:
      tags:
      - OOSA_REWILD_SERVICE
      - OOSA_REWILD_SERVICE
      - Event
      - _R 野放點細節 R/S Details
      - T2 揪團基地 Basecamp
      summary: Create Event
      description: Create new event
      operationId: create-event
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                events_date:
                  type: string
                  default: "2024-06-01T09:00:00Z"
                  example: "2024-06-01T09:00:00Z"
                events_date_end:
                  type: string
                  default: "2024-06-01T18:00:00Z"
                  example: "2024-06-01T18:00:00Z"
                events_deadline:
                  type: string
                  default: "2024-05-26T00:00:00Z"
                  example: "2024-05-26T00:00:00Z"
                events_lat:
                  type: number
                  default: -7.9421532937069514
                  example: -7.9421532937069514
                events_lng:
                  type: number
                  default: 112.95357004216902
                  example: 112.95357004216902
                events_meeting_point_lat:
                  type: number
                  default: -7.929088255289928
                  example: -7.929088255289928
                events_meeting_point_lng:
                  type: number
                  default: 112.9654222278174
                  example: 112.9654222278174
                events_name:
                  type: string
                  default: Hike to Bromo
                  example: Hike to Bromo
                events_participant_limit:
                  type: number
                  default: 4
                  example: 4
                events_payment_fee:
                  type: number
                  default: 450
                  example: 450
                events_payment_required:
                  type: integer
                  format: int32
                  default: 0
                  example: 0
                events_photo:
                  type: string
                  format: binary
                  example: ""
                events_place:
                  type: string
                  default: ChIJk9cKlIwgbzQR2BE-g395glo
                  example: ChIJk9cKlIwgbzQR2BE-g395glo
                events_requires_approval:
                  type: integer
                  format: int32
                  default: 1
                  example: 1
                events_rewilding:
                  type: string
                  example: ""
      responses:
        "200":
          description: New Event Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Events'
        "401":
          description: Unauthorised
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseGeneralError'
      security:
      - Bearer: []
