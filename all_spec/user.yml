          type: string
        user_followings_following:
          type: string
        user_followings_id:
          type: string
        user_followings_user:
          type: string
    RequestUserFollowing:
      type: object
      properties:
        user_followings_following:
          type: string
          default: 6613fae21977170d4fd608a6
    UserNotifications:
