openapi: 3.0.3
info:
  title: OOSA API
  description: This is OOSA's API
  version: 1.0.0
servers:
- url: https://api-dev.oosa.life
  description: OOSA's Dev API
- url: http://oosa_user:6080
  description: OOSA_USER_SERVICE
- url: http://oosa_rewild:6080
  description: OOSA_REWILD_SERVICE
tags:
- name: OOSA_REWILD_SERVICE
  description: This is OOSA's Rewild API
- name: OOSA_USER_SERVICE
  description: This is OOSA's User API
paths:
  /auth:
    get:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: Authentication
      description: Retrieve the authenticated user detail
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      security:
      - Bearer: []
  /auth/apple:
    post:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: User login/register
      description: Use this endpoint to login/register using Apple
      responses:
        "200":
          description: Login object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLogin'
  /auth/email:
    post:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: User login
      description: Use this endpoint to login using email
      requestBody:
        description: Register emai object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestUserLoginEmail'
      responses:
        "200":
          description: Login object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLogin'
  /auth/facebook:
    post:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: User login/register
      description: Use this endpoint to login/register using Facebook
      responses:
        "200":
          description: Login object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLogin'
  /auth/google:
    post:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: User login/register
      description: Use this endpoint to login/register using google
      requestBody:
        description: Pass in the value from Google's Login (We will use this value
          to get the user credentials)
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestGoogleAuth'
      responses:
        "200":
          description: Login object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLogin'
  /auth/line:
    get:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      summary: User login/register
      description: Use this endpoint to login/register using Line
      parameters:
      - name: code
        in: query
        description: Code passed to line
        schema:
          type: string
      - name: state
        in: query
        description: State passed to line
        schema:
          type: string
      responses:
        "200":
          description: Login object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLogin'
  /event:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event
      summary: Event
      description: Retrieve all events
      responses:
        "200":
          description: Event Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Events'
      security:
      - Bearer: []
    post:
      tags:
      - OOSA_REWILD_SERVICE
      - Event
      summary: Event
      description: Create new event
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEvent'
      responses:
        "200":
          description: New Event Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Events'
      security:
      - Bearer: []
  /event-collaborate:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Collaborate
      summary: Event Collaborate
      description: Retrieve events that has ended
      responses:
        "200":
          description: Event Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Events'
      security:
      - Bearer: []
  /event-collaborate/{eventId}:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Collaborate
      summary: Event Collaborate
      description: Retrieve detail on event
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Event Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Events'
      security:
      - Bearer: []
  /event-collaborate/{eventId}/album-link:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Collaborate
      summary: Event Collaborate
      description: Retrieve album link in event
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Event Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventAlbumLink'
      security:
      - Bearer: []
    post:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Collaborate
      summary: Event Collaborate
      description: Retrieve album link in event
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEventAlbumLinks'
      responses:
        "200":
          description: Event Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAlbumLink'
      security:
      - Bearer: []
  /event-collaborate/{eventId}/polaroid:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Collaborate
      summary: Event Polaroid
      description: Retrieve event polaroid
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Event Object
          content:
            form-data:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventPolaroids'
      security:
      - Bearer: []
    post:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Collaborate
      summary: Event Polaroid
      description: Create event polaroid (Uploaded file will be uploaded on Flickr).
        Read location data and save to database
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                event_polaroid_file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Event Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAlbumLink'
      security:
      - Bearer: []
  /event/{eventId}:
    delete:
      tags:
      - OOSA_REWILD_SERVICE
      - Event
      summary: Event
      description: Delete an event
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Delete response (message)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseGeneralSuccess'
      security:
      - Bearer: []
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event
      summary: Event
      description: Retrieve an event
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Event Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Events'
      security:
      - Bearer: []
    put:
      tags:
      - OOSA_REWILD_SERVICE
      - Event
      summary: Event
      description: Update an event
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEvent'
      responses:
        "200":
          description: Updated Event Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Events'
      security:
      - Bearer: []
  /event/{eventId}/accounting:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Accounting
      summary: Event Accounting
      description: Retrieve an event's accounting
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Array of EventAccounting Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventAccounting'
      security:
      - Bearer: []
    post:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Accounting
      summary: Create Event Accounting
      description: Create an entry on event's accounting
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      requestBody:
        description: Accounting object
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEventAccounting'
      responses:
        "200":
          description: New EventMessageBoard Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccounting'
      security:
      - Bearer: []
  /event/{eventId}/accounting/{accountingId}:
    delete:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Accounting
      summary: Delete accounting entry
      description: Delete an entry on event's accounting
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      - name: accountingId
        in: path
        description: String ID of the accounting record
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Success message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseGeneralSuccess'
      security:
      - Bearer: []
  /event/{eventId}/itinerary:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event
      summary: Event Itinerary
      description: Retrieve an event's itinerary
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Event Object with itinerary
      security:
      - Bearer: []
    put:
      tags:
      - OOSA_REWILD_SERVICE
      - Event
      summary: Event Message Board
      description: Itinerary co-edit
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Event Object with itinerary
      security:
      - Bearer: []
  /event/{eventId}/message-board:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Message Board
      summary: Event Message Board
      description: Retrieve an event's message board
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Array of EventMessageBoard Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventMessageBoard'
      security:
      - Bearer: []
    post:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Message Board
      summary: Event Message Board
      description: Create an entry on event's message board
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      requestBody:
        description: Send either event_message_board_base_message or event_message_board_announcement
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEventMessageBoard'
      responses:
        "200":
          description: New EventMessageBoard Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventMessageBoard'
      security:
      - Bearer: []
  /event/{eventId}/message-board/{messageBoardId}:
    delete:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Message Board
      summary: Delete message board entry
      description: Delete an entry on event's message board
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      - name: messageBoardId
        in: path
        description: String ID of the message
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Success message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseGeneralSuccess'
      security:
      - Bearer: []
  /event/{eventId}/participants:
    delete:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Participants
      summary: Event
      description: Remove a participant from an event
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Response message (success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseGeneralSuccess'
      security:
      - Bearer: []
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Participants
      summary: Event
      description: Retrieve an event's participants
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: EventParticipant Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventParticipants'
      security:
      - Bearer: []
    post:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Participants
      summary: Invite a participant to event
      description: Invite a participant to event
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEventParticipant'
      responses:
        "200":
          description: New EventParticipant Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventParticipants'
      security:
      - Bearer: []
  /event/{eventId}/reference-links:
    delete:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Reference Links
      summary: Event Reference Links
      description: Delete an event's reference links
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseGeneralSuccess'
      security:
      - Bearer: []
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Reference Links
      summary: Event Reference Links
      description: Retrieve an event's reference links
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Array of EventReferenceLinks Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventReferenceLinks'
      security:
      - Bearer: []
    post:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Reference Links
      summary: Create Reference Links
      description: Create an event's reference links
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEventReferenceLinks'
      responses:
        "200":
          description: Array of EventReferenceLinks Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventReferenceLinks'
      security:
      - Bearer: []
  /event/{eventId}/schedule:
    delete:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Schedule
      summary: Delete Event Schedule
      description: Delete an event's schedule
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseGeneralSuccess'
      security:
      - Bearer: []
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Schedule
      summary: Event Schedule
      description: Retrieve an event's schedule
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Array of EventReferenceLinks Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventSchedules'
      security:
      - Bearer: []
    post:
      tags:
      - OOSA_REWILD_SERVICE
      - Event Schedule
      summary: Create Event Schedule
      description: Create an event's schedule
      parameters:
      - name: eventId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEventSchedules'
      responses:
        "200":
          description: Array of EventReferenceLinks Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventSchedules'
      security:
      - Bearer: []
  /me/event-invitation:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Authenticated User Menu
      summary: Event Invitation
      description: Retrieve all invitation
      responses:
        "200":
          description: Event invitation object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Events'
      security:
      - Bearer: []
  /me/event-invitation/{eventInvitationId}:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Authenticated User Menu
      summary: Event Invitation
      description: Retrieve event invitation by ID
      parameters:
      - name: eventInvitationId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Event invitation object
      security:
      - Bearer: []
    put:
      tags:
      - OOSA_REWILD_SERVICE
      - Authenticated User Menu
      summary: Update Event Invitation
      description: Update event invitation (approve or reject)
      parameters:
      - name: eventInvitationId
        in: path
        description: String ID of the event
        required: true
        schema:
          type: integer
      requestBody:
        description: 1 - Accept, 0 Reject
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEventInvitation'
      responses:
        "200":
          description: Event invitation object
      security:
      - Bearer: []
  /me/friends:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Authenticated User Menu
      summary: Retrieve user's friends (following)
      description: Retrieve user's friends (following)
      responses:
        "200":
          description: Array of User Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserFriends'
      security:
      - Bearer: []
  /me/preferences:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Authenticated User Menu
      summary: Retrieve user's preferences
      description: Retrieve user preferences (language, avatar, preference)
      responses:
        "200":
          description: Auth User Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      security:
      - Bearer: []
    put:
      tags:
      - OOSA_REWILD_SERVICE
      - Authenticated User Menu
      summary: Update user preferences
      description: Update user preferences (language, avatar, preference)
      requestBody:
        description: Visibility 1 = true, 0 = false. Language used ISO3166
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestUserPreference'
      responses:
        "200":
          description: Auth User Object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      security:
      - Bearer: []
  /my/event:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - User Event
      summary: User Event
      description: Retrieve an authenticated user events
      parameters:
      - name: past
        in: query
        description: Pass true to retrieve past events by user. Otherwise omit this
          query parameter
        schema:
          type: boolean
      responses:
        "200":
          description: Array of EventReferenceLinks Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Events'
      security:
      - Bearer: []
  /pocket-list:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Pocket List
      summary: Get pocket list
      description: Get pocket list
      responses:
        "200":
          description: Array of PocketList objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PocketList'
      security:
      - Bearer: []
    post:
      tags:
      - OOSA_REWILD_SERVICE
      - Pocket List
      summary: Create new pocket list
      description: Create pocket list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPocketList'
      responses:
        "200":
          description: New PocketList objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PocketList'
      security:
      - Bearer: []
  /pocket-list/{pocketListId}:
    delete:
      tags:
      - OOSA_REWILD_SERVICE
      - Pocket List
      summary: Delete pocket list
      description: Delete pocket list
      parameters:
      - name: pocketListId
        in: path
        description: String ID of the user to get pocket list
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseGeneralSuccess'
      security:
      - Bearer: []
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Pocket List
      summary: Get pocket list
      description: Get pocket list
      parameters:
      - name: pocketListId
        in: path
        description: String ID of the user to get pocket list
        required: true
        schema:
          type: integer
      responses:
        "200":
          description: Array of PocketList objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PocketList'
      security:
      - Bearer: []
    put:
      tags:
      - OOSA_REWILD_SERVICE
      - Pocket List
      summary: Update existing pocket list
      description: Update existing pocket list
      parameters:
      - name: pocketListId
        in: path
        description: String ID of the user to get pocket list
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestPocketList'
      responses:
        "200":
          description: Updated pocket list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PocketList'
      security:
      - Bearer: []
  /pocket-list/{pocketListId}/items:
    get:
      tags:
      - OOSA_REWILD_SERVICE
      - Pocket List
