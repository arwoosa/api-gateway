---
kind: pipeline
type: exec
name: default

platform:
  os: darwin
  arch: amd64

steps:
- name: merge api spec
  commands:
  - docker run -v $PWD:/workdir 94peter/openapi-cli:v1.8 /main ms -main /workdir/main_spec.yml -mergeDir /workdir/all_spec/ -output /workdir/doc/oosa.yml
- name: generate setting endpoint
  commands:
  - docker run -v $PWD:/workdir 94peter/openapi-cli:v1.8 /main togs -spec /workdir/doc/oosa.yml -output /workdir/settings/endpoint.json
- name: generate oath rules
  commands:
  - docker run -v $PWD:/workdir 94peter/openapi-cli:v1.8 /main tar -spec /workdir/doc/oosa.yml -output /workdir/doc/rules.json
- name: build image
  commands:
  - docker build -t oosa-gw:dev .
- name: restart service
  commands:
  - docker-compose -f docker-dev.yml down
  - docker container prune -f
  - docker-compose -f docker-dev.yml up -d

trigger:
  branch:
  - dev
...