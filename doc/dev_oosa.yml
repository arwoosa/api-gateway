    get:
      tags:
      - OOSA_REWILD_SERVICE
      - T1 探索 Discover
      - Event
      - T3 野放成就 Achievement
      summary: Retrieve Achievements
      description: Retrieve all events
      operationId: get-events
      parameters:
      - name: achievement_type
        in: query
        schema:
          type: string
      responses:
        "200":
          description: Event Object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AchievementEvent'
        "204":
          description: No event found
          content:
            '*/*':
              schema:
                type: object
      security:
      - Bearer: []
      externalDocs:
        description: OOSA_REWILD_SERVICE
        url: http://oosa_rewild:6080
  /auth:
    get:
      tags:
      - OOSA_USER_SERVICE
      - Authentication
      - T5 個人 My
      summary: Read Authentication
      description: Retrieve the authenticated user detail. <br/>1. Google<br/>2. Line<br/>3.
        Email<br/>4. Facebook
      operationId: getAuthInfo
      responses:
        "200":
          description: User object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "400":
