serve:
  proxy:
    port: 4455 # run the proxy at port 4455
  api:
    port: 4456 # run the api at port 4456

access_rules:
  repositories:
    - http://api-gateway:8000/doc/rules.json
    - file:///etc/config/oathkeeper/user_rules.json
errors:
  fallback:
    - json
  handlers:
    json:
      enabled: true
      config:
        verbose: true
    redirect:
      enabled: true
      config:
        to: https://www.ory.sh/docs

mutators:
  header:
    enabled: true
    config:
      headers:
        X-Userid: "{{ print .Subject }}"
        X-User: "{{ print .Extra.username}}"
        X-Email: "{{ print .Extra.email}}"
        X-Language: "{{ print .Extra.language}}"
        X-Name: "{{ print .Extra.name}}"
  noop:
    enabled: true

authorizers:
  allow:
    enabled: true
  deny:
    enabled: true

authenticators:
  unauthorized:
    enabled: true
  anonymous:
    enabled: true
    config:
      subject: guest
  bearer_token:
    enabled: true
    config:
      check_session_url: http://kratos:4433/sessions/whoami
      preserve_path: true
      preserve_query: false
      subject_from: identity.id
      extra_from: "@this"
  cookie_session:
    # Set enabled to true if the authenticator should be enabled and false to disable the authenticator. Defaults to false.
    enabled: true

    config:
      check_session_url: http://kratos:4433/sessions/whoami
      # only:
      # - oosa_session
      preserve_path: true
      subject_from: identity.id
      extra_from: "identity.traits"
