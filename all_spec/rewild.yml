  /event:
    post:
      summary: Create Event
      deprecated: false
      description: Create new event
      operationId: create-event
      tags:
        - OOSA_REWILD_SERVICE
        - Event
        - _R 野放點細節 R/S Details
        - T2 揪團基地 Basecamp
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                events_date:
                  type: string
                  default: '2024-06-01T09:00:00Z'
                  description: 活動開始時間
                  example: '2024-06-01T09:00:00Z'
                events_date_end:
                  type: string
                  default: '2024-06-01T18:00:00Z'
                  description: 活動結束時間
                  example: '2024-06-01T18:00:00Z'
                events_deadline:
                  type: string
                  default: '2024-05-26T00:00:00Z'
                  description: 報名截止時間
                  example: '2024-05-26T00:00:00Z'
                events_lat:
                  type: number
                  default: -7.9421532937069514
                  description: 活動地點-經度
                  example: '25.032510610605097'
                events_lng:
                  type: number
                  default: 112.95357004216902
                  description: 活動地點-緯度
                  example: '121.58739934934991'
                events_meeting_point_lat:
                  type: number
                  default: -7.929088255289928
                  description: 集合地點-經度
                  example: '25.03305498837257'
                events_meeting_point_lng:
                  type: number
                  default: 112.9654222278174
                  description: 集合地點-緯度
                  example: '121.57010446535351'
                events_meeting_point_name:
                  example: 象山站
                  type: string
                events_name:
                  type: string
                  default: Hike to Bromo
                  description: 行程名稱
                  example: 虎山親山步道
                events_participant_limit:
                  type: number
                  default: 4
                  description: 人數上限 (0表示不限制)
                  example: '0'
                events_payment_fee:
                  type: number
                  default: 450
                  description: 報名費用 (商業團專用)
                  example: '0'
                events_payment_required:
                  type: integer
                  format: int32
                  default: 0
                  description: 非商業團帶(0)
                  example: '0'
                events_photo:
                  format: binary
                  type: string
                events_place:
                  type: string
                  default: ChIJk9cKlIwgbzQR2BE-g395glo
                  description: 'Add from map: pass in Google Place ID'
                  example: ChIJX9SSyAirQjQR9B9f7PKLqJo
                events_requires_approval:
                  type: integer
                  format: int32
                  default: 1
                  example: '1'
                events_rewilding:
                  type: string
                  description: 'Add from pocketlist: Pass in Rewilding ID'
                events_type:
                  type: string
                events_participants:
                  type: array
                  items:
                    type: string
              required:
                - events_date
                - events_date_end
                - events_deadline
                - events_lat
                - events_lng
                - events_meeting_point_lat
                - events_meeting_point_lng
                - events_meeting_point_name
                - events_name
      responses:
        '200':
          description: New Event Object
          content:
            application/json:
              schema: *ref_8
        '401':
          description: Unauthorised
          content:
            application/json:
              schema: *ref_11
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                type: object
                properties: {}
