  /rewilding-search:
    get:
      summary: Search rewilding from Google
      deprecated: false
      description: Search rewilding from Google
      operationId: search-rewilding
      tags:
        - OOSA_REWILD_SERVICE
        - Rewilding Search
        - T1 探索 Discover
        - T2 揪團基地 Basecamp
      parameters:
        - name: lat
          in: query
          description: Latitude
          required: false
          schema:
            type: string
        - name: lng
          in: query
          description: Longitude
          required: false
          schema:
            type: string
        - name: type
          in: query
          description: Activity type
          required: false
          schema:
            type: string
            enum:
              - mountain_climbing
              - hiking_area
              - ecol_landscape
              - camping
              - picnic
              - water_related
            x-apidog:
              enumDescriptions:
                mountain_climbing: 登山
                hiking_area: 健行
                ecol_landscape: ''
                camping: 露營
                picnic: 野餐
                water_related: 親水
        - name: search
          in: query
          description: Search by Text
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Array of Rewilding Result from Google
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RewildingSearch'
        '400':
          description: General Error
